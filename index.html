<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caneca 360° - Preview Three.js</title>
  </head>
  <body>
    <div id="app">
      <aside class="panel">
        <h1>Caneca 360°</h1>
        <p class="muted">Envie uma arte 21cm × 9,7cm, proporção 19.5:9.</p>

        <label class="fileBox">
          <span>Selecionar mockup</span>
          <input id="artFile" type="file" accept="image/png,image/jpeg,image/webp" />
        </label>

        <div class="grid2">
          <label>Resolução
            <select id="resolution">
              <option value="1920x1080">Full HD 1920×1080</option>
              <option value="2560x1440">2K 2560×1440</option>
              <option value="3840x2160">4K 3840×2160</option>
              <option value="1080x1080">Quadrado 1080×1080</option>
            </select>
          </label>
          <label>FPS
            <select id="fps">
              <option>30</option>
              <option>60</option>
            </select>
          </label>
        </div>

        <div class="grid2">
          <label>Duração
            <input id="duration" type="number" min="2" max="20" step="0.5" value="6" />
          </label>
          <label>Qualidade
            <select id="bitrate">
              <option value="12000000">Alta</option>
              <!-- <option value="20000000">Muito alta</option>
              <option value="35000000">Ultra</option> -->
            </select>
          </label>
        </div>

        <details open>
          <summary>Ajustes físicos</summary>
          <div class="grid2">
            <label>Altura caneca cm
              <input id="mugHeight" type="number" step="0.1" value="9.7" />
            </label>
            <label>Diâmetro cm
              <input id="mugDiameter" type="number" step="0.1" value="8.2" />
            </label>
            <label>Arte largura cm
              <input id="artWidth" type="number" step="0.1" value="21" />
            </label>
            <label>Arte altura cm
              <input id="artHeight" type="number" step="0.1" value="9.7" />
            </label>
            <label>Margem superior cm
              <input id="topMargin" type="number" step="0.01" value="0" />
            </label>
            <label>Centro oposto à alça
              <input id="oppositeCenterDeg" type="number" step="1" value="90" />
            </label>
          </div>
        </details>

        <details>
          <summary>Aparência</summary>
          <div class="grid2">
            <label>Zoom câmera
              <input id="cameraZoom" type="range" min="4.5" max="9" step="0.1" value="6.2" />
            </label>
            <label>Altura câmera
              <input id="cameraHeight" type="range" min="0" max="5" step="0.05" value="2" />
            </label>
            <label>Brilho ambiente
              <input id="ambientPower" type="range" min="0" max="3" step="0.1" value="1.25" />
            </label>
            <label>Suavidade da caneca
              <input id="segments" type="number" min="64" max="512" step="32" value="192" />
            </label>
            <label>Cor interna
              <input id="insideColor" type="color" value="#ffffff" />
            </label>
          </div>
        </details>

        <button id="renderBtn" disabled>Renderizar vídeo 360°</button>
        <button id="snapshotBtn" disabled>Baixar imagem PNG</button>
        <a id="downloadLink" class="download" hidden>Baixar vídeo</a>
        <p id="status" class="status">Carregue uma imagem para começar.</p>
      </aside>

      <main>
        <canvas id="stage"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
